<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#eef2ff,#f8f9ff);color:var(--color-text-primary,#1a1a18);min-height:100vh}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
input,select,textarea{font-family:inherit;font-size:14px;padding:8px 12px;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,0.3));border-radius:8px;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a18);width:100%;outline:none;transition:border-color 0.15s}
input:focus,select:focus,textarea:focus{border-color:#5347b4;box-shadow:0 0 0 2px rgba(83,74,183,0.15)}
button{font-family:inherit;font-size:14px;padding:9px 18px;border-radius:8px;cursor:pointer;transition:all 0.15s;font-weight:500;border:none}
.btn-primary{background:linear-gradient(135deg,#5347b4,#6c5ce7);color:#fff}
.btn-primary:hover{background:#3c3489}
.btn-secondary{background:transparent;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,0.3));color:var(--color-text-primary,#1a1a18)}
.btn-secondary:hover{background:var(--color-background-secondary,rgba(0,0,0,0.05))}
.btn-danger{background:#a32d2d;color:#fff}
.btn-danger:hover{background:#791f1f}
.btn-sm{padding:6px 12px;font-size:12px}
.card{background:#fff;border:none;border-radius:20px;padding:1.25rem;box-shadow:0 15px 40px rgba(0,0,0,.12)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:500}
.badge-success{background:#eaf3de;color:#27500a}
.badge-warning{background:#faeeda;color:#633806}
.badge-info{background:#e6f1fb;color:#0c447c}
.badge-purple{background:#eeedfe;color:#3c3489}
.badge-danger{background:#fcebeb;color:#791f1f}
.metric-card{background:var(--color-background-secondary,rgba(0,0,0,0.04));border-radius:8px;padding:1rem}
.metric-label{font-size:12px;color:var(--color-text-secondary,rgba(0,0,0,0.5));margin-bottom:4px}
.metric-value{font-size:24px;font-weight:500;color:var(--color-text-primary,#1a1a18)}
.form-label{font-size:13px;font-weight:500;color:var(--color-text-secondary,rgba(0,0,0,0.6));margin-bottom:5px;display:block}
.form-group{margin-bottom:1rem}
.error{font-size:12px;color:#a32d2d;margin-top:4px}
.nav-tab{padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;border:none;background:transparent;color:var(--color-text-secondary,rgba(0,0,0,0.5));transition:all 0.15s}
.nav-tab.active{background:#eeedfe;color:#3c3489}
.nav-tab:hover:not(.active){background:var(--color-background-secondary,rgba(0,0,0,0.04))}
.table-row{display:grid;padding:10px 12px;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.1));font-size:13px;align-items:center}
.table-row:hover{background:var(--color-background-secondary,rgba(0,0,0,0.02))}
.table-header{font-size:11px;font-weight:500;color:var(--color-text-secondary,rgba(0,0,0,0.5));text-transform:uppercase;letter-spacing:0.05em;padding:8px 12px;background:var(--color-background-secondary,rgba(0,0,0,0.03));border-radius:8px 8px 0 0}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:14px;transition:all 0.15s;color:var(--color-text-primary,#1a1a18)}
.sidebar-item:hover{background:rgba(255,255,255,0.15)}
.sidebar-item.active{background:rgba(255,255,255,0.25);font-weight:500}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:var(--color-background-primary,#fff);border-radius:12px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-header{padding:1.25rem;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.1));display:flex;justify-content:space-between;align-items:center}
.modal-body{padding:1.25rem}
.modal-footer{padding:1rem 1.25rem;border-top:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.1));display:flex;gap:8px;justify-content:flex-end}
.progress-bar{height:6px;background:var(--color-background-secondary,rgba(0,0,0,0.08));border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#5347b4;border-radius:3px;transition:width 0.3s}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a1a18;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;z-index:2000;animation:slideUp 0.2s ease}
@keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.chart-bar{transition:height 0.5s ease}
.divider{height:0.5px;background:var(--color-border-tertiary,rgba(0,0,0,0.1));margin:1rem 0}
select option{background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a18)}
</style>
</head>
<body>
<h2 class="sr-only">Naye Pank Foundation — Volunteer Registration & Management System</h2>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const DB = {
  users: [
    {id:'u1',name:'Admin User',email:'admin@nayepank.org',password:'admin123',role:'admin',createdAt:'2024-01-01'},
    {id:'u2',name:'Priya Sharma',email:'priya@nayepank.org',password:'vol123',role:'volunteer',createdAt:'2024-01-15'}
  ],
  volunteers: [
    {id:'v1',userId:'u2',name:'Priya Sharma',email:'priya@nayepank.org',phone:'9876543210',age:24,gender:'Female',city:'Patna',state:'Bihar',skills:['Teaching','Healthcare'],availability:'Weekends',motivation:'Want to give back to society',status:'approved',joinDate:'2024-01-15',hoursLogged:48,events:['e1','e2']},
    {id:'v2',userId:null,name:'Rahul Kumar',email:'rahul.k@email.com',phone:'9123456780',age:28,gender:'Male',city:'Muzaffarpur',state:'Bihar',skills:['IT Support','Photography'],availability:'Evenings',motivation:'Passionate about education',status:'pending',joinDate:'2024-02-20',hoursLogged:0,events:[]},
    {id:'v3',userId:null,name:'Anjali Singh',email:'anjali.s@email.com',phone:'9988776655',age:22,gender:'Female',city:'Gaya',state:'Bihar',skills:['Teaching','Arts & Crafts'],availability:'Full-time',motivation:'Empower rural children',status:'approved',joinDate:'2024-02-10',hoursLogged:72,events:['e1','e3']},

    {id:'v5',userId:null,name:'Sunita Devi',email:'sunita.d@email.com',phone:'9765432100',age:26,gender:'Female',city:'Bhagalpur',state:'Bihar',skills:['Teaching','NGO Management'],availability:'Full-time',motivation:'Women empowerment',status:'rejected',joinDate:'2024-03-15',hoursLogged:0,events:[]},
    {id:'v6',userId:null,name:'Vikram Yadav',email:'vikram.y@email.com',phone:'9654321007',age:35,gender:'Male',city:'Patna',state:'Bihar',skills:['Fundraising','Event Management'],availability:'Weekends',motivation:'Community development',status:'pending',joinDate:'2024-04-01',hoursLogged:0,events:[]}
  ],
  events: [
    {id:'e1',name:'Back to School Drive',date:'2024-03-15',location:'Patna',volunteers:['v1','v3'],hoursPerVolunteer:8,type:'Education'},

    {id:'e3',name:'Women Empowerment Workshop',date:'2024-05-05',location:'Gaya',volunteers:['v3'],hoursPerVolunteer:6,type:'Empowerment'}
  ]
};

let currentUser = null;
let currentPage = 'login';
let adminPage = 'dashboard';
let toastTimer = null;
let editingVolunteer = null;
let showModal = false;
let filterStatus = 'all';
let filterSkill = 'all';
let searchQuery = '';

function saveDB(){localStorage.setItem('nayepank_db', JSON.stringify(DB));}
function loadDB(){const d=localStorage.getItem('nayepank_db');if(d){const p=JSON.parse(d);Object.assign(DB,p);}}
try{loadDB();}catch(e){}

function showToast(msg){
  const t=document.getElementById('toast-el');
  if(t)t.remove();
  if(toastTimer)clearTimeout(toastTimer);
  const el=document.createElement('div');
  el.id='toast-el';el.className='toast';el.textContent=msg;
  document.body.appendChild(el);
  toastTimer=setTimeout(()=>{const t=document.getElementById('toast-el');if(t)t.remove();},3000);
}

function navigate(page,sub){
  currentPage=page;
  if(sub)adminPage=sub;
  render();
}

function login(email,pwd){
  const u=DB.users.find(x=>x.email===email&&x.password===pwd);
  if(!u){showToast('Invalid email or password');return;}
  currentUser=u;
  currentPage=u.role==='admin'?'admin':'volunteer-portal';
  render();
}

function logout(){currentUser=null;currentPage='login';render();}

function registerVolunteer(data){
  const existing=DB.users.find(u=>u.email===data.email);
  if(existing){showToast('Email already registered');return false;}

  const userId='u'+Date.now();

  DB.users.push({
    id:userId,
    name:data.name,
    email:data.email,
    password:data.password,
    role:'volunteer',
    createdAt:new Date().toISOString().split('T')[0]
  });

  DB.volunteers.push({
    ...data,
    id:'v'+Date.now(),
    userId:userId,
    status:'pending',
    joinDate:new Date().toISOString().split('T')[0],
    hoursLogged:0,
    events:[]
  });

  saveDB();
  showToast('Registration successful! You can now login.');
  navigate('login');
  return true;
}

function updateVolunteerStatus(id,status){
  const v=DB.volunteers.find(x=>x.id===id);
  if(v){v.status=status;saveDB();render();showToast(`Volunteer ${status}`);}
}

function deleteVolunteer(id){
  const idx=DB.volunteers.findIndex(x=>x.id===id);
  if(idx>-1){DB.volunteers.splice(idx,1);saveDB();render();showToast('Volunteer removed');}
}

function getStats(){
  const vols=DB.volunteers;
  return {
    total:vols.length,
    approved:vols.filter(v=>v.status==='approved').length,
    pending:vols.filter(v=>v.status==='pending').length,
    rejected:vols.filter(v=>v.status==='rejected').length,
    totalHours:vols.reduce((s,v)=>s+v.hoursLogged,0),
    events:DB.events.length,
    cities:[...new Set(vols.map(v=>v.city))].length
  };
}

function filteredVolunteers(){
  return DB.volunteers.filter(v=>{
    const matchStatus=filterStatus==='all'||v.status===filterStatus;
    const matchSkill=filterSkill==='all'||v.skills.includes(filterSkill);
    const matchSearch=!searchQuery||v.name.toLowerCase().includes(searchQuery.toLowerCase())||v.email.toLowerCase().includes(searchQuery.toLowerCase())||v.city.toLowerCase().includes(searchQuery.toLowerCase());
    return matchStatus&&matchSkill&&matchSearch;
  });
}

function allSkills(){
  const s=new Set();DB.volunteers.forEach(v=>v.skills.forEach(sk=>s.add(sk)));
  return [...s].sort();
}

// RENDER ENGINE
function render(){
  const app=document.getElementById('app');
  if(currentPage==='login')app.innerHTML=renderLogin();
  else if(currentPage==='register')app.innerHTML=renderRegister();
  else if(currentPage==='admin')app.innerHTML=renderAdmin();
  else if(currentPage==='volunteer-portal')app.innerHTML=renderVolunteerPortal();
  attachEvents();
  if(currentPage==='admin'&&adminPage==='reports')setTimeout(renderCharts,100);
}

function renderLogin(){return`
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem">

      <div style="width:64px;height:64px;background:#5347b4;border-radius:16px;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>

<div style="margin-top:10px;font-size:12px;opacity:.9;">
Login as Admin to manage volunteers, events and reports.
</div>
</div>

</div>
`;}

function renderAdmin(){
  const stats=getStats();
  const pages={dashboard:renderDashboard,volunteers:renderVolunteers,events:renderEvents,reports:renderReports};
  return`

function renderDashboard(){
  const s=getStats();
  const approved=DB.volunteers.filter(v=>v.status==='approved');
  const recent=DB.volunteers.slice().sort((a,b)=>new Date(b.joinDate)-new Date(a.joinDate)).slice(0,4);
  return`
<div>
  <h2 style="font-size:20px;font-weight:500;margin-bottom:1.5rem">Dashboard overview</h2>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem">
    <div class="metric-card"><div class="metric-label">Total volunteers</div><div class="metric-value">${s.total}</div></div>
    <div class="metric-card"><div class="metric-label">Active (approved)</div><div class="metric-value" style="color:#27500a">${s.approved}</div></div>
    <div class="metric-card"><div class="metric-label">Pending review</div><div class="metric-value" style="color:#633806">${s.pending}</div></div>
    <div class="metric-card"><div class="metric-label">Total hours logged</div><div class="metric-value" style="color:#3c3489">${s.totalHours}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <h3 style="font-size:15px;font-weight:500">Volunteer status</h3>
      </div>
      ${[['Approved',s.approved,s.total,'#5347b4'],['Pending',s.pending,s.total,'#ba7517'],['Rejected',s.rejected,s.total,'#a32d2d']].map(([l,v,t,c])=>`
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
          <span>${l}</span><span style="font-weight:500">${v}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${t?Math.round(v/t*100):0}%;background:${c}"></div></div>
      </div>`).join('')}
    </div>
    <div class="card">
      <h3 style="font-size:15px;font-weight:500;margin-bottom:1rem">Top contributors</h3>
      ${approved.sort((a,b)=>b.hoursLogged-a.hoursLogged).slice(0,4).map(v=>`

function renderCharts(){
  if(typeof Chart==='undefined')return;
  const vols=DB.volunteers;
  const monthMap={};
  vols.forEach(v=>{const m=v.joinDate.slice(0,7);monthMap[m]=(monthMap[m]||0)+1;});
  const months=Object.keys(monthMap).sort();
  const cityMap={};vols.forEach(v=>{cityMap[v.city]=(cityMap[v.city]||0)+1;});
  const skillMap={};vols.forEach(v=>v.skills.forEach(s=>{skillMap[s]=(skillMap[s]||0)+1;}));
  const opts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}};

  const gc=document.getElementById('chart-growth');
  if(gc)new Chart(gc,{type:'bar',data:{labels:months.map(m=>{const[y,mo]=m.split('-');return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(mo)-1]+' '+y.slice(2);}),datasets:[{label:'New volunteers',data:months.map(m=>monthMap[m]),backgroundColor:'#7f77dd',borderRadius:4}]},options:{...opts,scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});

  const cc=document.getElementById('chart-city');
  const cities=Object.keys(cityMap);
  if(cc)new Chart(cc,{type:'bar',data:{labels:cities,datasets:[{label:'Volunteers',data:cities.map(c=>cityMap[c]),backgroundColor:'#1d9e75',borderRadius:4}]},options:{...opts,scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});

  const sc=document.getElementById('chart-skills');
  const skills=Object.keys(skillMap).sort((a,b)=>skillMap[b]-skillMap[a]);
  if(sc)new Chart(sc,{type:'bar',data:{labels:skills,datasets:[{label:'Count',data:skills.map(s=>skillMap[s]),backgroundColor:'#5347b4',borderRadius:4}]},options:{...opts,indexAxis:'y',scales:{x:{beginAtZero:true,ticks:{stepSize:1}}}}});

  const stc=document.getElementById('chart-status');
  const s=DB.volunteers.reduce((a,v)=>{a[v.status]=(a[v.status]||0)+1;return a;},{});
  if(stc)new Chart(stc,{type:'doughnut',data:{labels:['Approved','Pending','Rejected'],datasets:[{data:[s.approved||0,s.pending||0,s.rejected||0],backgroundColor:['#5347b4','#ba7517','#a32d2d'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
}

function exportCSV(){
  const rows=[['Name','Email','Phone','Age','Gender','City','State','Skills','Availability','Status','Joined','Hours'],...DB.volunteers.map(v=>[v.name,v.email,v.phone,v.age,v.gender,v.city,v.state,v.skills.join(';'),v.availability,v.status,v.joinDate,v.hoursLogged])];
  const csv=rows.map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='nayepank_volunteers.csv';a.click();
  showToast('CSV exported successfully');
}

  const skills=[...document.querySelectorAll('.skill-cb:checked')].map(c=>c.value);
  const password=get('reg-password'),confirmPassword=get('reg-confirm-password');
  const name=get('reg-name'),age=parseInt(get('reg-age')),email=get('reg-email'),phone=get('reg-phone'),gender=get('reg-gender'),city=get('reg-city'),state=get('reg-state'),avail=get('reg-avail'),motivation=get('reg-motivation');
  const err=document.getElementById('reg-error');
  if(password!==confirmPassword){err.style.display='block';err.textContent='Passwords do not match';return;}
  if(!name||!age||!email||!phone||!gender||!city||!avail||!motivation||skills.length===0){
    err.style.display='block';err.textContent='Please fill in all required fields and select at least one skill.';return;
  }
  if(age<18){err.style.display='block';err.textContent='You must be at least 18 years old.';return;}
  if(!/\S+@\S+\.\S+/.test(email)){err.style.display='block';err.textContent='Please enter a valid email.';return;}
  err.style.display='none';
  registerVolunteer({name,age,email,password,phone,gender,city,state,skills,availability:avail,motivation});
}

window.navigate=navigate;window.login=login;window.logout=logout;
window.handleLogin=handleLogin;window.handleRegister=handleRegister;
window.updateVolunteerStatus=updateVolunteerStatus;window.deleteVolunteer=deleteVolunteer;
window.openVolunteerModal=openVolunteerModal;window.exportCSV=exportCSV;
window.filterStatus='all';window.filterSkill='all';window.searchQuery='';

render();
</script>
</body>
</html>
